server:
  address: 0.0.0.0
  port: 8080 #端口号
#数据库配置
spring:
  data:
    redis: #redis配置
      host: 127.0.0.1
      port: 6379
      password: wumengyun520.
      database: 0

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    username: root
    password: wumengyun520.
    url: jdbc:mysql://localhost:3306/gyjz?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver

  #opengauss相关的配置，占位区

druid:
  initial-size: 5
  min-idle: 5
  max-active: 20
  max-wait: 60000
  time-between-eviction-runs-millis: 60000
  min-evictable-idle-time-millis: 300000
  validation-query: SELECT 1 FROM DUAL
  test-while-idle: true
  test-on-borrow: false
  test-on-return: false
  pool-prepared-statements: true
  max-pool-prepared-statement-per-connection-size: 20

#mybatis-plus配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.SCAUteam11.GYJZ.entity
  configuration:
    map-underscore-to-camel-case: true #开启驼峰命名
    cache-enabled: true # 开启二级缓存，同时需要在xml中开启

#配置日志级别
logging:
  level:
    org.mybatis: DEBUG
    org.mybatis.spring: DEBUG
    com.example.student_manage_system: DEBUG



